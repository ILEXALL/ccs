name: ccs_app
description: "A new Flutter project."
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.12.0

dependencies:
  flutter:
    sdk: flutter

  firebase_core: ^3.6.0
  cloud_firestore: ^5.4.4
  firebase_storage: ^12.3.3
  firebase_auth: ^5.3.1
  firebase_messaging: ^15.1.3

  cupertino_icons: ^1.0.8
  flutter_map: 7.0.2
  latlong2: ^0.9.1
  google_sign_in: ^7.2.0
  shared_preferences: ^2.5.5
  url_launcher: ^6.3.2
  geolocator: ^14.0.2
  image: ^4.8.0

  # Use 2.2.2 because geocoding 3.x can force geocoding_android to compile
  # against an incompatible Android SDK in this project.
  geocoding: 2.2.2

dev_dependencies:
  flutter_test:
    sdk: flutter

  flutter_launcher_icons: ^0.13.1
  flutter_lints: ^6.0.0

flutter_launcher_icons:
  android: true
  ios: true
  image_path: "assets/icon.png"
  adaptive_icon_background: "#000000"
  adaptive_icon_foreground: "assets/icon.png"

flutter:
  uses-material-design: true

  assets:
    - assets/bg.png
    - assets/bg_map.png
    - assets/spot_icons/
    - assets/user_cars/
    - assets/ccs_logo.png
